name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release to create the Release on tag push

jobs:
  build:
    name: Build ${{ matrix.target.arch }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: windows-latest, triple: x86_64-pc-windows-msvc,  arch: x64 }
          - { os: windows-11-arm, triple: aarch64-pc-windows-msvc, arch: arm64 }
    runs-on: ${{ matrix.target.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install WiX Toolset (for MSI build, tag-only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          # Refresh env so $env:WIX picks up the install (choco doesn't propagate to current shell by default).
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1" -ErrorAction SilentlyContinue
          if (Get-Command refreshenv -ErrorAction SilentlyContinue) { refreshenv }
          $wixBin = if ($env:WIX) { Join-Path $env:WIX 'bin' } else { $null }
          if (-not $wixBin -or -not (Test-Path $wixBin)) {
            # Fallback to known WiX 3.14 install path (ARM64 runner, where env may not refresh)
            $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          }
          if (-not (Test-Path $wixBin)) { throw "Could not locate WiX bin directory" }
          Write-Host "WiX bin: $wixBin"
          echo $wixBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target.triple }}

      - name: Run tests
        if: matrix.target.arch == 'x64'
        run: cargo test --release --target ${{ matrix.target.triple }}

      - name: Package zip
        shell: pwsh
        run: |
          $arch = "${{ matrix.target.arch }}"
          $repo = "${{ github.event.repository.name }}".ToLower()
          $stage = "stage-$arch"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Get-ChildItem "target/${{ matrix.target.triple }}/release/*.exe" -ErrorAction SilentlyContinue | Copy-Item -Destination $stage
          if ((Get-ChildItem $stage -ErrorAction SilentlyContinue).Count -eq 0) {
            Write-Host "No exe artifacts found yet (scaffold-only build)."
            exit 0
          }
          Compress-Archive -Path "$stage/*" -DestinationPath "$repo-windows-$arch.zip" -Force
          Get-ChildItem "$repo-windows-$arch.zip" | Format-List

      - name: Build MSI installer (tag-only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v") -replace "-.+",""
          $arch = "${{ matrix.target.arch }}"
          $repo = "${{ github.event.repository.name }}".ToLower()
          New-Item -ItemType Directory -Force -Path "target/wix" | Out-Null
          & candle.exe wix/main.wxs `
            -dCargoTargetBinDir="target/${{ matrix.target.triple }}/release" `
            -dPlatform="$arch" `
            -dPlatformProgramFilesFolder="ProgramFiles64Folder" `
            -dWin64="yes" `
            -dVersion="$version" `
            -arch $arch `
            -out wix/main.wixobj
          & light.exe wix/main.wixobj -out "target/wix/$repo-windows-$arch.msi"
          Get-ChildItem "target/wix/*.msi" | Format-List

      - name: Upload artifact
        if: hashFiles('*.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-windows-${{ matrix.target.arch }}
          path: '*.zip'

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            target/wix/*.msi
