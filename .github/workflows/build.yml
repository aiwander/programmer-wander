name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target.arch }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: windows-latest, triple: x86_64-pc-windows-msvc,  arch: x64 }
          - { os: windows-11-arm, triple: aarch64-pc-windows-msvc, arch: arm64 }
    runs-on: ${{ matrix.target.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target.triple }}

      - name: Run tests
        if: matrix.target.arch == 'x64'
        run: cargo test --release --target ${{ matrix.target.triple }}

      - name: Package zip
        shell: pwsh
        run: |
          $arch = "${{ matrix.target.arch }}"
          $repo = "${{ github.event.repository.name }}".ToLower()
          $stage = "stage-$arch"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Get-ChildItem "target/${{ matrix.target.triple }}/release/*.exe" -ErrorAction SilentlyContinue | Copy-Item -Destination $stage
          if ((Get-ChildItem $stage -ErrorAction SilentlyContinue).Count -eq 0) {
            Write-Host "No exe artifacts found yet (scaffold-only build)."
            exit 0
          }
          Compress-Archive -Path "$stage/*" -DestinationPath "$repo-windows-$arch.zip" -Force
          Get-ChildItem "$repo-windows-$arch.zip" | Format-List

      - name: Upload artifact
        if: hashFiles('*.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-windows-${{ matrix.target.arch }}
          path: '*.zip'

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') && hashFiles('*.zip') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
