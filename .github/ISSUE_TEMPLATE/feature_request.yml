name: Feature request
description: Suggest something new for programmer
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or workflow that's currently painful.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the API / tool / behavior look like?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
